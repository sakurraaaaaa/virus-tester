<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL SCAN | BIO-SECURITY</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* This fixes the "Mixed Content" cursor error you saw in F12 */
        * {
            cursor: url('https://cur.cursors-4u.net/nature/nat-10/nat927.ani'), url('https://cur.cursors-4u.net/nature/nat-10/nat927.png'), auto !important;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="scan-container">
        <header>
            <h1 class="glitch">NEURAL_SCAN_v2.0</h1>
            <p class="subtitle">PROJECT_BLACKBIRD SECURE_UPLOADER</p>
        </header>

        <div id="drop-zone" class="scanner">
            <div class="laser"></div>
            <div class="inner-text">
                <p>FEED THE MACHINE (DRAG FILE)</p>
            </div>
            <input type="file" id="file-input" hidden>
        </div>

        <div id="results-area" class="hidden">
            <p id="status-text">INITIALIZING...</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
